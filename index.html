<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGIS WMS & WFS - OpenLayers</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.0.0/ol.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="control-panel">
      <h3>Kontrol Peta (WMS vs WFS)</h3>
      <p style="font-size: 12px; color: #555; margin-top: 0">Bandingkan render Server (Gambar) vs Klien (Vektor)</p>
      <div>
        <input type="checkbox" id="wmsToggle" checked />
        <label for="wmsToggle">WMS Layer (Gambar / Raster)</label>
      </div>
      <div>
        <input type="checkbox" id="wfsToggle" checked />
        <label for="wfsToggle">WFS Layer (Garis Merah / Vektor)</label>
      </div>
      <hr />
      <div>
        <label for="cqlFilter"><strong>Filter WMS (CQL):</strong></label
        ><br />
        <select id="cqlFilter">
          <option value="">-- Semua Area --</option>
          <option value="SUB_REGION = 'Pacific'">Area Pasifik</option>
          <option value="SUB_REGION = 'South Atlantic'">Area Atlantik Selatan</option>
          <option value="PERSONS > 5000000">Populasi > 5 Juta</option>
        </select>
      </div>
    </div>

    <div id="map" class="map"></div>

    <div id="popup" class="ol-popup">
      <a href="#" id="popup-closer" class="ol-popup-closer"></a>
      <div id="popup-content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@10.0.0/dist/ol.js"></script>
    <script src="main.js"></script>
  </body>
</html>
